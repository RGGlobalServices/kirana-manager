<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Vyapar Sarthi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="payment.css" />
  <style>
    .auth-body { background: linear-gradient(135deg, #f0f4ff 0%, #fdf2ff 60%, #fff7ed 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { background: #fff; border-radius: 24px; border: 1px solid #e5e7eb; padding: 40px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .auth-title { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .auth-sub { text-align: center; color: #6b7280; margin-bottom: 24px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; }
    .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .cta-btn { width: 100%; padding: 14px; border: 0; border-radius: 12px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; }
    .auth-foot { margin-top: 14px; text-align: center; color: #6b7280; font-size: 14px; }
    .auth-foot a { color: #4f46e5; text-decoration: none; font-weight: 700; }
    .error-msg { display: none; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px; margin-bottom: 14px; font-size: 13px; }
    .error-msg.show { display: block; }
  </style>
</head>
<body class="auth-body">
  <header class="pay-header">
    <a href="index.html" class="logo">
      <span class="logo-icon">🛒</span>
      <span class="logo-text">Vyapar<strong>Sarthi</strong></span>
    </a>
    <a href="login.html" class="btn btn-ghost" style="font-size:13px;padding:10px 18px;">Login</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Sign up first, then continue to your free trial plan.</p>
      <div id="errorMsg" class="error-msg"></div>
      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="name" class="form-input" placeholder="Ramesh Gupta" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" type="email" class="form-input" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Mobile Number</label>
          <input id="phone" class="form-input" maxlength="10" placeholder="9876543210" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Minimum 8 characters" />
        </div>
        <button type="submit" class="cta-btn" id="submitBtn">Continue to Trial Plan</button>
      </form>
      <div class="auth-foot">Already have account? <a id="loginLink" href="login.html">Login</a></div>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const nextRaw = params.get('next') || 'payment.html?plan=professional';
    const loginLink = document.getElementById('loginLink');
    loginLink.href = `login.html?next=${encodeURIComponent(nextRaw)}`;

    // Pre-fill email if passed from login page
    const emailParam = params.get('email');
    if (emailParam) {
      document.getElementById('email').value = emailParam;
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');
      error.classList.remove('show');

      if (!name || !email || !/^\d{10}$/.test(phone) || password.length < 8) {
        error.textContent = 'Please fill all fields correctly.';
        error.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const result = await ksPost('/auth/register', {
        email,
        password,
        full_name: name,
        shop_name: 'New Shop',
        business_type: 'kirana'
      });

      btn.disabled = false;
      btn.textContent = 'Continue to Trial Plan';

      if (!result.ok) {
        error.textContent = result.error || 'Signup failed.';
        error.classList.add('show');
        return;
      }

      localStorage.setItem('ks_prefill_name', name);
      localStorage.setItem('ks_prefill_email', email);
      localStorage.setItem('ks_prefill_phone', phone);

      const token = result.data?.access_token;
      const user = result.data?.user;
      if (token) ksSetAuth(token, user);

      window.location.href = nextRaw;
    });
  </script>
</body>
</html>
