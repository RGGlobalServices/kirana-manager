<!DOCTYPE html>
<html lang="en" class="lang-en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vyapar Sarthi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="payment.css" />
  <style>
    .login-body { background: linear-gradient(135deg, #f0f4ff 0%, #fdf2ff 60%, #fff7ed 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .login-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .login-card { background: #fff; border-radius: 24px; border: 1px solid #e5e7eb; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .login-icon { font-size: 40px; text-align: center; margin-bottom: 8px; }
    .login-title { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .login-sub { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; font-family: inherit; color: #111827; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .pass-wrap { position: relative; }
    .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 16px; cursor: pointer; opacity: 0.6; }
    .forgot-link { display: block; text-align: right; font-size: 13px; color: #4f46e5; text-decoration: none; margin-top: 4px; }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 20px rgba(79,70,229,0.35); transition: all 0.2s; margin-top: 4px; }
    .login-btn:hover { transform: translateY(-2px); }
    .or-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #9ca3af; font-size: 13px; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .social-btn { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; color: #374151; margin-bottom: 10px; }
    .social-btn:hover { border-color: #4f46e5; background: #f0f4ff; }
    .signup-btn { width: 100%; padding: 12px; border: 1.5px solid #4f46e5; border-radius: 10px; background: #eef2ff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; color: #3730a3; margin-bottom: 10px; text-decoration: none; }
    .signup-btn:hover { background: #e0e7ff; transform: translateY(-1px); }
    .login-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #6b7280; }
    .login-footer a { color: #4f46e5; font-weight: 600; text-decoration: none; }
    .error-msg { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

  </style>
</head>
<body class="login-body">

<header class="pay-header">
  <a href="index.html" class="logo">
    <span class="logo-icon">🛒</span>
    <span class="logo-text">Vyapar<strong>Sarthi</strong></span>
  </a>
  <a href="signup.html?next=payment.html%3Fplan%3Dprofessional" class="btn btn-primary" style="font-size:13px;padding:10px 18px;" data-i18n="nav_trial" id="topTrialLink">Start Free Trial</a>
</header>

<main class="login-main">
  <div class="login-card">
    <div class="login-icon">🛒</div>
    <h1 class="login-title" data-i18n="login_welcome">Welcome Back!</h1>
    <p class="login-sub" data-i18n="login_sub">Login to your Vyapar Sarthi account</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" data-i18n="login_email">Email / Mobile Number</label>
        <input type="text" class="form-input" id="loginEmail" data-i18n-placeholder="login_placeholder" placeholder="email@example.com or 9876543210" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login_pass">Password</label>
        <div class="pass-wrap">
          <input type="password" class="form-input" id="loginPass" data-i18n-placeholder="login_pass_ph" placeholder="Enter your password" />
          <button type="button" class="toggle-pass" id="loginTogglePass" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <a href="forgot-password.html" class="forgot-link" data-i18n="login_forgot">Forgot Password?</a>
      </div>
      <button type="submit" class="login-btn" data-i18n="login_btn">Login to Dashboard →</button>
    </form>

    <div class="or-divider" data-i18n="login_or">or continue with</div>

    <button class="social-btn" onclick="handleGoogleLogin()">
      <span>G</span> <span data-i18n="login_google">Continue with Google</span>
    </button>
    <a class="signup-btn" href="signup.html?next=payment.html%3Fplan%3Dprofessional" id="signupTrialBtn">
      ✨ Sign Up & Start Free Trial
    </a>

    <div class="login-footer">
      <span data-i18n="login_new">New to Vyapar Sarthi?</span> <a href="signup.html?next=payment.html%3Fplan%3Dprofessional" data-i18n="nav_trial" id="footerTrialLink">Start Free Trial →</a>
    </div>
  </div>
</main>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script>
/* ── Password toggle ─────────────────────────────────────────── */
document.getElementById('loginTogglePass').addEventListener('click', () => {
  const inp = document.getElementById('loginPass');
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = isPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

/* ── Login submit ────────────────────────────────────────────── */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const emailOrPhone = document.getElementById('loginEmail')?.value.trim() || '';
  const pass         = document.getElementById('loginPass')?.value || '';
  const errMsg       = document.getElementById('errorMsg');
  const btn          = e.target.querySelector('button[type="submit"]');

  const resetBtn = () => { if (btn) { btn.textContent = __('login_btn'); btn.disabled = false; } };

  if (errMsg) errMsg.classList.remove('show');

  try {

  if (!emailOrPhone || !pass) {
    if (errMsg) { errMsg.textContent = __('login_error_req'); errMsg.classList.add('show'); }
    return;
  }

  // Backend now supports login by email OR 10-digit mobile number directly

  if (btn) { btn.textContent = __('login_connecting'); btn.disabled = true; }

  // ── Call backend login API ─────────────────────────────────
  const result = await ksPost('/auth/login', {
    email: emailOrPhone,
    password:      pass,
    shop_name:     '',
    business_type: 'kirana',
  });

  resetBtn();

  if (result.ok) {
    const { access_token, user: apiUser } = result.data || {};
    if (access_token) {
      ksSetAuth(access_token, apiUser);
      // Save/update ks_user so phone-number login works on next visit
      if (apiUser) {
        const existing = JSON.parse(localStorage.getItem('ks_user') || '{}');
        existing.email = apiUser.email || existing.email;
        if (apiUser.mobile) existing.mobile = apiUser.mobile;
        localStorage.setItem('ks_user', JSON.stringify(existing));
      }
      const params = new URLSearchParams(window.location.search);
      const nextTarget = params.get('next');
      let target = 'index.html';
      if (nextTarget) {
        target = decodeURIComponent(nextTarget);
      } else {
        const locale = (typeof ksGetLocale === 'function' ? ksGetLocale() : 'en');
        const frontend = (window.KS_CONFIG?.FRONTEND_URL || 'http://localhost:3000');
        const isRegistered = Boolean(localStorage.getItem('ks_user'));
        if (isRegistered) target = `${frontend}/${locale}`;
      }
      window.location.assign(target);
    } else {
      if (errMsg) { errMsg.textContent = `❌ ${__('login_failed')}: Invalid response from server`; errMsg.classList.add('show'); }
    }
    return;
  }

  if (result.error && result.error.startsWith('NETWORK_ERROR')) {
    if (errMsg) { errMsg.textContent = __('login_network_err'); errMsg.style.display = 'block'; errMsg.classList.add('show'); }
    return;
  }

  // If no account found, show sign-up prompt with the entered email pre-filled
  if (result.error && result.error.includes('No account found')) {
    const signupUrl = `signup.html?email=${encodeURIComponent(emailOrPhone)}&next=${encodeURIComponent(new URLSearchParams(window.location.search).get('next') || 'payment.html?plan=professional')}`;
    if (errMsg) {
      errMsg.innerHTML = `❌ No account found. <a href="${signupUrl}" style="color:#4f46e5;font-weight:600;">Sign up here →</a>`;
      errMsg.classList.add('show');
    }
    return;
  }

  if (errMsg) { errMsg.textContent = `❌ ${__('login_failed')}: ${result.error || 'Unknown error'}`; errMsg.classList.add('show'); }

  } catch (err) {
    console.error('Login error:', err);
    resetBtn();
    if (errMsg) { errMsg.textContent = `❌ ${__('login_failed')}: ${err.message || 'Unexpected error'}`; errMsg.classList.add('show'); }
  }
});

/* ── Google Login ─────────────────────────────────────────────── */
function handleGoogleLogin() {
  const clientId = KS_CONFIG.GOOGLE_CLIENT_ID;
  if (!clientId) {
    const errMsg = document.getElementById('errorMsg');
    if (errMsg) { errMsg.textContent = 'Google login is not configured. Please contact support.'; errMsg.classList.add('show'); }
    return;
  }

  // Use Google Identity Services if loaded
  if (window.google?.accounts) {
    google.accounts.id.initialize({
      client_id: clientId,
      callback: handleGoogleCredential,
    });
    google.accounts.id.prompt();
    return;
  }

  // Fallback: load GIS dynamically
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    google.accounts.id.initialize({
      client_id: clientId,
      callback: handleGoogleCredential,
    });
    google.accounts.id.prompt();
  };
  document.head.appendChild(s);
}

async function handleGoogleCredential(response) {
  const errMsg = document.getElementById('errorMsg');
  if (errMsg) errMsg.classList.remove('show');

  if (!response?.credential) {
    if (errMsg) { errMsg.textContent = 'Google sign-in failed. Please try again.'; errMsg.classList.add('show'); }
    return;
  }

  const result = await ksPost('/auth/google', { credential: response.credential });

  if (result.ok) {
    const { access_token, user: apiUser } = result.data || {};
    if (access_token) {
      ksSetAuth(access_token, apiUser);
      if (apiUser) {
        const existing = JSON.parse(localStorage.getItem('ks_user') || '{}');
        existing.email = apiUser.email || existing.email;
        if (apiUser.mobile) existing.mobile = apiUser.mobile;
        localStorage.setItem('ks_user', JSON.stringify(existing));
      }
      const params = new URLSearchParams(window.location.search);
      const nextTarget = params.get('next');
      let target = 'index.html';
      if (nextTarget) target = decodeURIComponent(nextTarget);
      else {
        const locale = (typeof ksGetLocale === 'function' ? ksGetLocale() : 'en');
        const frontend = (window.KS_CONFIG?.FRONTEND_URL || 'http://localhost:3000');
        const isRegistered = Boolean(localStorage.getItem('ks_user'));
        if (isRegistered) target = `${frontend}/${locale}`;
      }
      window.location.assign(target);
    }
    return;
  }

  if (errMsg) { errMsg.textContent = `❌ ${__('login_failed')}: ${result.error || 'Google login failed'}`; errMsg.classList.add('show'); }
}

/* Keep selected plan when user comes from payment redirect */
(() => {
  const params = new URLSearchParams(window.location.search);
  const nextRaw = params.get('next') || 'payment.html?plan=professional';
  const encodedNext = encodeURIComponent(nextRaw);
  const signupUrl = `signup.html?next=${encodedNext}`;
  const top = document.getElementById('topTrialLink');
  const mid = document.getElementById('signupTrialBtn');
  const foot = document.getElementById('footerTrialLink');
  if (top) top.href = signupUrl;
  if (mid) mid.href = signupUrl;
  if (foot) foot.href = signupUrl;
})();
</script>
</body>
</html>
