<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password - Vyapar Sarthi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="payment.css" />
  <style>
    .auth-body { background: linear-gradient(135deg, #f0f4ff 0%, #fdf2ff 60%, #fff7ed 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { background: #fff; border-radius: 24px; border: 1px solid #e5e7eb; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .auth-title { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .auth-sub { text-align: center; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; }
    .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .cta-btn { width: 100%; padding: 14px; border: 0; border-radius: 12px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; }
    .auth-foot { margin-top: 18px; text-align: center; color: #6b7280; font-size: 14px; }
    .auth-foot a { color: #4f46e5; text-decoration: none; font-weight: 700; }
    .msg { display: none; border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 13px; line-height: 1.45; }
    .msg.show { display: block; }
    .msg.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .msg.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
  </style>
</head>
<body class="auth-body">
  <header class="pay-header">
    <a href="index.html" class="logo">
      <span class="logo-icon">🛒</span>
      <span class="logo-text">Vyapar<strong>Sarthi</strong></span>
    </a>
    <a href="login.html" class="btn btn-ghost" style="font-size:13px;padding:10px 18px;">Login</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-title">Set New Password</h1>
      <p class="auth-sub">Choose a new password for your Vyapar Sarthi account.</p>
      <div id="messageBox" class="msg"></div>
      <form id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input id="password" type="password" class="form-input" placeholder="Minimum 8 characters" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input id="confirmPassword" type="password" class="form-input" placeholder="Re-enter password" />
        </div>
        <button type="submit" class="cta-btn" id="submitBtn">Update Password</button>
      </form>
      <div class="auth-foot"><a href="login.html">Back to login</a></div>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetForm');
    const messageBox = document.getElementById('messageBox');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(type, text) {
      messageBox.className = `msg ${type} show`;
      messageBox.textContent = text;
    }

    if (!token) {
      form.style.display = 'none';
      showMessage('error', 'Reset link is missing or invalid. Please request a new link.');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password.length < 8) {
        showMessage('error', 'Password must be at least 8 characters.');
        return;
      }
      if (password !== confirmPassword) {
        showMessage('error', 'Passwords do not match.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const result = await ksPost('/auth/reset-password', { token, password });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Update Password';

      if (!result.ok) {
        showMessage('error', result.error || 'Unable to update password. Please request a new link.');
        return;
      }

      showMessage('success', 'Password updated successfully. You can now login.');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1400);
    });
  </script>
</body>
</html>
