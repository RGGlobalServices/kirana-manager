<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Vyapar Sarthi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="payment.css" />
  <style>
    .auth-body { background: linear-gradient(135deg, #f0f4ff 0%, #fdf2ff 60%, #fff7ed 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { background: #fff; border-radius: 24px; border: 1px solid #e5e7eb; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .auth-title { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .auth-sub { text-align: center; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; }
    .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .cta-btn { width: 100%; padding: 14px; border: 0; border-radius: 12px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; }
    .auth-foot { margin-top: 18px; text-align: center; color: #6b7280; font-size: 14px; }
    .auth-foot a { color: #4f46e5; text-decoration: none; font-weight: 700; }
    .msg { display: none; border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 13px; line-height: 1.45; }
    .msg.show { display: block; }
    .msg.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .msg.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .dev-link { display: block; margin-top: 8px; word-break: break-all; color: #3730a3; font-weight: 700; }
  </style>
</head>
<body class="auth-body">
  <header class="pay-header">
    <a href="index.html" class="logo">
      <span class="logo-icon">🛒</span>
      <span class="logo-text">Vyapar<strong>Sarthi</strong></span>
    </a>
    <a href="login.html" class="btn btn-ghost" style="font-size:13px;padding:10px 18px;">Login</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter your registered email. We will send a secure reset link.</p>
      <div id="messageBox" class="msg"></div>
      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input id="email" type="email" class="form-input" placeholder="email@example.com" />
        </div>
        <button type="submit" class="cta-btn" id="submitBtn">Send Reset Link</button>
      </form>
      <div class="auth-foot"><a href="login.html">Back to login</a></div>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const messageBox = document.getElementById('messageBox');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(type, html) {
      messageBox.className = `msg ${type} show`;
      messageBox.innerHTML = html;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage('error', 'Please enter a valid email address.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      const result = await ksPost('/auth/forgot-password', { email });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';

      if (!result.ok) {
        showMessage('error', result.error || 'Unable to send reset link. Please try again.');
        return;
      }

      let html = result.data?.message || 'If this email is registered, a reset link has been sent.';
      if (result.data?.reset_link) {
        html += `<a class="dev-link" href="${result.data.reset_link}">Open reset link</a>`;
      }
      showMessage('success', html);
    });
  </script>
</body>
</html>
